<title>G2 Connect - Application Finale</title>

</head>
<body>
<div id="root"></div>

<div id="g2-fast-login" hidden>
  <form id="g2-fast-login-card">
    <h1>G2 CONNECT</h1>
    <p>Connexion sécurisée</p>
    <label for="g2-fast-agent">Fonctionnaire</label>
    <select id="g2-fast-agent" name="agent"></select>
    <label for="g2-fast-password">Mot de passe</label>
    <input id="g2-fast-password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Connexion</button>
    <div id="g2-fast-login-error">Mot de passe incorrect.</div>
  </form>
</div>
